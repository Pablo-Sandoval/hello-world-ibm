<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hello World – IBM Cloud</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');
    :root { --bg:#0a0a0a; --cyan:#33b1ff; --green:#42be65; --purple:#be95ff; --yellow:#f1c21b; --white:#f4f4f4; --dim:#8d8d8d; --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--white); font-family:var(--sans); min-height:100vh; overflow-x:hidden; }
    #bg-canvas { position:fixed; inset:0; z-index:0; opacity:0.35; }
    .page { position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 24px; gap:48px; }
    .terminal { width:100%; max-width:680px; background:#161616; border:1px solid #393939; border-radius:4px; box-shadow:0 32px 80px rgba(0,0,0,0.6),0 0 0 1px rgba(51,177,255,0.08); overflow:hidden; animation:float 6s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-10px)} }
    .terminal-bar { background:#262626; padding:12px 16px; display:flex; align-items:center; gap:8px; border-bottom:1px solid #393939; }
    .dot-red   { width:12px; height:12px; border-radius:50%; background:#da1e28; }
    .dot-yellow{ width:12px; height:12px; border-radius:50%; background:#f1c21b; }
    .dot-green { width:12px; height:12px; border-radius:50%; background:#42be65; }
    .terminal-title { margin-left:auto; margin-right:auto; transform:translateX(-20px); font-family:var(--mono); font-size:12px; color:var(--dim); }
    .terminal-body { padding:28px 32px; font-family:var(--mono); font-size:14px; line-height:1.9; }
    .line { display:flex; align-items:baseline; gap:8px; opacity:0; }
    .line.show { animation:fadein 0.4s forwards; }
    @keyframes fadein { to { opacity:1; } }
    .prompt { color:var(--green); flex-shrink:0; }
    .cmd    { color:var(--white); }
    .out    { color:var(--dim); padding-left:20px; }
    .hi     { color:var(--cyan); font-weight:600; }
    .ok     { color:var(--green); }
    .purple { color:var(--purple); }
    .cursor { display:inline-block; width:8px; height:16px; background:var(--cyan); margin-left:2px; vertical-align:middle; animation:blink 1s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .stats { display:flex; gap:32px; flex-wrap:wrap; justify-content:center; }
    .stat { display:flex; flex-direction:column; align-items:center; gap:6px; opacity:0; animation:rise 0.6s forwards; }
    .stat:nth-child(1){animation-delay:2.8s} .stat:nth-child(2){animation-delay:3.0s} .stat:nth-child(3){animation-delay:3.2s} .stat:nth-child(4){animation-delay:3.4s}
    @keyframes rise { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .stat-value { font-family:var(--mono); font-size:28px; font-weight:600; color:var(--cyan); }
    .stat-label { font-size:11px; font-weight:600; letter-spacing:1.2px; text-transform:uppercase; color:var(--dim); }
    .badges { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; opacity:0; animation:rise 0.6s 3.6s forwards; }
    .badge { font-family:var(--mono); font-size:11px; font-weight:600; padding:4px 12px; border-radius:2px; letter-spacing:0.5px; }
    .badge-blue   { background:rgba(51,177,255,0.12); color:var(--cyan);   border:1px solid rgba(51,177,255,0.3); }
    .badge-green  { background:rgba(66,190,101,0.12); color:var(--green);  border:1px solid rgba(66,190,101,0.3); }
    .badge-purple { background:rgba(190,149,255,0.12); color:var(--purple); border:1px solid rgba(190,149,255,0.3); }
    .badge-yellow { background:rgba(241,194,27,0.12);  color:var(--yellow); border:1px solid rgba(241,194,27,0.3); }
    footer { font-family:var(--mono); font-size:11px; color:#525252; text-align:center; letter-spacing:0.5px; opacity:0; animation:rise 0.6s 4s forwards; }
    footer a { color:#525252; text-decoration:none; } footer a:hover { color:var(--cyan); }
    @media(max-width:600px){ .terminal-body{padding:20px 16px;font-size:12px} .stat-value{font-size:22px} }
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="page">
  <div class="terminal">
    <div class="terminal-bar">
      <div class="dot-red"></div><div class="dot-yellow"></div><div class="dot-green"></div>
      <span class="terminal-title">bash — hello-world-app</span>
    </div>
    <div class="terminal-body" id="term"></div>
  </div>
  <div class="stats">
    <div class="stat"><span class="stat-value" id="cnt-regions">0</span><span class="stat-label">Regions</span></div>
    <div class="stat"><span class="stat-value">99.9%</span><span class="stat-label">Uptime SLA</span></div>
    <div class="stat"><span class="stat-value">0→∞</span><span class="stat-label">Scale to Zero</span></div>
    <div class="stat"><span class="stat-value" id="cnt-ms">~0ms</span><span class="stat-label">Cold Start</span></div>
  </div>
  <div class="badges">
    <span class="badge badge-blue">IBM Code Engine</span>
    <span class="badge badge-green">✓ Serverless</span>
    <span class="badge badge-purple">us-south · Dallas</span>
    <span class="badge badge-yellow">revision 00003</span>
  </div>
  <footer>
    © 2026 IBM Corporation &nbsp;·&nbsp;
    <a href="https://github.com/Pablo-Sandoval/hello-world-ibm">github.com/Pablo-Sandoval/hello-world-ibm</a>
    &nbsp;·&nbsp;
    <a href="https://cloud.ibm.com/codeengine">cloud.ibm.com/codeengine</a>
  </footer>
</div>
<script>
  const canvas=document.getElementById('bg-canvas'),ctx=canvas.getContext('2d');
  let W,H,cols,rows;
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;cols=Math.ceil(W/48);rows=Math.ceil(H/48);}
  window.addEventListener('resize',resize);resize();
  const cells=[];
  function initCells(){cells.length=0;for(let r=0;r<=rows;r++)for(let c=0;c<=cols;c++)cells.push({x:c*48,y:r*48,a:Math.random(),s:0.2+Math.random()*0.8});}
  initCells();
  function drawGrid(t){
    ctx.clearRect(0,0,W,H);
    ctx.strokeStyle='rgba(51,177,255,0.06)';ctx.lineWidth=1;
    for(let c=0;c<=cols;c++){ctx.beginPath();ctx.moveTo(c*48,0);ctx.lineTo(c*48,H);ctx.stroke();}
    for(let r=0;r<=rows;r++){ctx.beginPath();ctx.moveTo(0,r*48);ctx.lineTo(W,r*48);ctx.stroke();}
    cells.forEach(cell=>{
      const pulse=(Math.sin(t*cell.s*0.001+cell.a*10)+1)/2;
      ctx.beginPath();ctx.arc(cell.x,cell.y,1.5,0,Math.PI*2);
      ctx.fillStyle=`rgba(51,177,255,${pulse*0.5})`;ctx.fill();
    });
  }
  requestAnimationFrame(function loop(t){drawGrid(t);requestAnimationFrame(loop);});

  const lines=[
    {type:'cmd',prompt:'❯',text:'ibmcloud ce app get --name hello-world-app'},
    {type:'out',text:''},
    {type:'out',text:'<span class="hi">Name:</span>           hello-world-app'},
    {type:'out',text:'<span class="hi">Project:</span>        hello-world-project'},
    {type:'out',text:'<span class="hi">Region:</span>         <span class="purple">us-south (Dallas)</span>'},
    {type:'out',text:'<span class="hi">Status:</span>         <span class="ok">✓ ready</span>'},
    {type:'out',text:'<span class="hi">Revision:</span>       hello-world-app-00003'},
    {type:'out',text:'<span class="hi">URL:</span>            <span style="color:#33b1ff">https://hello-world-app.2c20o2zjytt9.us-south...</span>'},
    {type:'out',text:''},
    {type:'cmd',prompt:'❯',text:'echo "Hello, World! 🌍"'},
    {type:'out',text:'<span class="ok">Hello, World! 🌍</span>'},
    {type:'out',text:''},
    {type:'cursor'},
  ];
  const term=document.getElementById('term');
  let delay=300;
  lines.forEach(line=>{
    setTimeout(()=>{
      const div=document.createElement('div');div.classList.add('line');
      if(line.type==='cmd') div.innerHTML=`<span class="prompt">${line.prompt}</span><span class="cmd">${line.text}</span>`;
      else if(line.type==='out'){div.classList.add('out');div.innerHTML=line.text||'&nbsp;';}
      else if(line.type==='cursor') div.innerHTML=`<span class="prompt">❯</span><span class="cursor"></span>`;
      div.classList.add('show');term.appendChild(div);
    },delay);
    delay+=line.type==='cmd'?600:line.type==='out'&&line.text===''?100:250;
  });
  function countUp(el,target,suffix,duration){let s=0;const step=target/(duration/16);const t=setInterval(()=>{s=Math.min(s+step,target);el.textContent=Math.round(s)+suffix;if(s>=target)clearInterval(t);},16);}
  setTimeout(()=>countUp(document.getElementById('cnt-regions'),6,'',800),2800);
  setTimeout(()=>countUp(document.getElementById('cnt-ms'),350,'ms',1000),3200);
</script>
</body>
</html>
